<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PharmaScan Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cyber-bg': '#080c10',
                        'cyber-card': '#0d1117',
                        'cyber-border': '#1e2a38',
                        'cyber-accent-green': '#00e5a0',
                        'cyber-accent-blue': '#0ea5e9',
                    }
                }
            }
        }
    </script>
    <style type="text/css">
        body {
            background-color: #080c10;
            color: #e2e8f0;
        }
        .cyber-sidebar {
            background-color: #0d1117;
            border-right: 1px solid #1e2a38;
        }
        .cyber-card {
            background-color: #0d1117;
            border: 1px solid #1e2a38;
        }
        .accent-text-green { color: #00e5a0; }
        .accent-text-blue { color: #0ea5e9; }
        .accent-border-green { border-color: #00e5a0; }
        .accent-border-blue { border-color: #0ea5e9; }
        .sec-head {
            font-size: 0.875rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #1e2a38;
            padding-bottom: 0.5rem;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 cyber-sidebar fixed h-full hidden md:block">
        <div class="p-6">
            <h1 class="text-2xl font-bold accent-text-green mb-8">PharmaScan</h1>
            <nav class="space-y-4">
                <a href="{% url 'core:dashboard' %}" class="block px-4 py-2 rounded hover:bg-cyber-border transition {% if request.resolver_match.url_name == 'dashboard' %}accent-text-blue bg-cyber-border{% endif %}">📊 Summary</a>
                <a href="{% url 'core:network' %}" class="block px-4 py-2 rounded hover:bg-cyber-border transition {% if request.resolver_match.url_name == 'network' %}accent-text-blue bg-cyber-border{% endif %}">🕸️ Network Graph</a>
                <a href="{% url 'core:fraud' %}" class="block px-4 py-2 rounded hover:bg-cyber-border transition {% if request.resolver_match.url_name == 'fraud' %}accent-text-blue bg-cyber-border{% endif %}">🔍 Fraud Detection</a>
                <div class="pt-4 border-t border-cyber-border">
                    <a href="{% url 'core:upload' %}" class="block px-4 py-2 rounded hover:bg-cyber-border transition text-xs text-slate-500 uppercase">Onboard New Data</a>
                </div>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 md:ml-64 p-8">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-semibold">{% block header_title %}Overview{% endblock %}</h2>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-slate-400">Welcome, User</span>
                <div class="w-10 h-10 rounded-full bg-cyber-accent-blue flex items-center justify-center text-white font-bold">
                    U
                </div>
            </div>
        </header>

        <section>
            {% block content %}{% endblock %}
        </section>
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
